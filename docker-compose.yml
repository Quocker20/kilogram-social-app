services:
  mysql-db:
    image: mysql:8.0
    container_name: kilogram-mysql
    restart: always
    env_file:
      - kilogram.env
    environment:
      MYSQL_DATABASE: kilogram_db
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-admin}
    ports:
      - "3306:3306"
    volumes:
      - kilogram_db_data:/var/lib/mysql
    networks:
      - kilogram-network

  redis:
    image: redis:7-alpine
    container_name: kilogram-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - kilogram-network

networks:
  kilogram-network:
    driver: bridge

volumes:
  kilogram_db_data: