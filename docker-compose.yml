services:
  mysql-db:
    image: mysql:8.0
    container_name: kilogram-mysql
    restart: always
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: kilogram_db
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-admin}
    ports:
      - "3306:3306"
    volumes:
      - kilogram_db_data:/var/lib/mysql
    networks:
      - kilogram-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kilogram-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - kilogram_redis_data:/data
    networks:
      - kilogram-network

networks:
  kilogram-network:
    driver: bridge

volumes:
  kilogram_db_data:
  kilogram_redis_data: